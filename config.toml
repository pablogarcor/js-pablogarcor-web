baseURL = 'https://pablogarcor.com/'
title = 'pablogarcor Site'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    contentDir = 'content/en'
    languageCode = 'en-us'
    languageName = 'English'
    weight = 1

  [languages.es]
    contentDir = 'content/es'
    languageCode = 'es-es'
    languageName = 'Español'
    weight = 2

[permalinks]
  blog = "/:slug/"
